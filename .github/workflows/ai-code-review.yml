name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare artifacts directory
        run: mkdir -p .github/artifacts

      - name: Run lint (non-blocking)
        run: |
          npm run lint > .github/artifacts/lint.txt 2>&1 || true

      - name: Run npm audit (non-blocking)
        run: |
          npm audit --omit=dev --json > .github/artifacts/audit.json 2>&1 || true

      - name: Build audit summary
        run: |
          node -e "
          const fs = require('fs');
          const inFile = '.github/artifacts/audit.json';
          const outFile = '.github/artifacts/audit-summary.txt';
          if (!fs.existsSync(inFile)) {
            fs.writeFileSync(outFile, 'audit result not found');
            process.exit(0);
          }
          const raw = fs.readFileSync(inFile, 'utf8').trim();
          try {
            const data = JSON.parse(raw);
            const meta = data.metadata?.vulnerabilities || {};
            const lines = [
              'npm audit summary',
              `total: ${meta.total ?? 0}`,
              `critical: ${meta.critical ?? 0}`,
              `high: ${meta.high ?? 0}`,
              `moderate: ${meta.moderate ?? 0}`,
              `low: ${meta.low ?? 0}`,
              '',
            ];
            const vulns = data.vulnerabilities || {};
            const names = Object.keys(vulns).slice(0, 20);
            if (names.length) {
              lines.push('top vulnerable packages:');
              for (const name of names) {
                const item = vulns[name] || {};
                const severity = item.severity || 'unknown';
                const fix = item.fixAvailable ? 'fixAvailable' : 'noAutoFix';
                lines.push(`- ${name}: ${severity}, ${fix}`);
              }
            } else {
              lines.push('no vulnerable packages reported');
            }
            fs.writeFileSync(outFile, lines.join('\n'));
          } catch {
            fs.writeFileSync(
              outFile,
              'Could not parse audit JSON. Raw output:\n' + raw.slice(0, 8000),
            );
          }
          "

      - name: Run AI PR review and post comment
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
        run: node .github/scripts/ai-pr-review.mjs

      - name: Warn if ANTHROPIC_API_KEY is missing
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::warning::ANTHROPIC_API_KEY secret is not configured. AI review step was skipped."
